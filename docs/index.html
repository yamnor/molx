<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Documentation for molx, a lightweight molecular structure viewer and sharing app.">
  <meta name="theme-color" content="#ffffff">
  <title>molx docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="/assets/molx-docs.css">
</head>
<body>
  <div id="app">Loading molx docs...</div>
  <script>
    window.$docsify = {
      name: "molx",
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      themeColor: "#5898d4",
      search: {
        placeholder: "Search docs",
        noData: "No results",
        depth: 3
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
